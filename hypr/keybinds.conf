# --- Atajos de Aplicaciones ---
$terminal = kitty
$fileManager = nautilus
$menu = rofi -show drun
$browser = brave
$editor = code

bind = SUPER, T, exec, $terminal
bind = SUPER, E, exec, $fileManager
bind = SUPER, B, exec, $browser
bind = SUPER, C, exec, $editor
bind = SUPER, SPACE, exec, $menu
bind = SUPER, Q, killactive
bind = SUPER, M, exit
bind = SUPER, F, fullscreen, 0
bind = SUPER, V, togglefloating
bind = SUPER, P, pseudo # dwindle
bind = SUPER, J, layoutmsg, togglesplit # dwindle
bind = SUPER, W, exec, waypaper 

# --- Enfoque de Ventanas (Focus) ---
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# --- Cambiar entre Espacios de Trabajo (Workspaces) ---
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# --- Mover Ventana a Espacio de Trabajo ---
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# --- Scratchpad (Espacio especial) ---
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# --- Scroll para cambiar de Workspace ---
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# --- Mover y Redimensionar con el Mouse ---
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# --- Teclas Multimedia (Fn) ---
# F2 & F3: Control de Brillo
bindel = , XF86MonBrightnessUp, exec, ~/.config/hypr/widgets/osd.sh bri_up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/widgets/osd.sh bri_down

# F4: Cambio de Pantalla (Presentación)
bind = , XF86Display, exec, hyprctl dispatch dpms toggle

# F5: Retroiluminación del Teclado
bindel = , XF86KbdBrightnessUp, exec, brightnessctl -d *kbdbacklight* set 10%+
bindel = , XF86KbdBrightnessDown, exec, brightnessctl -d *kbdbacklight* set 10%-

# F6, F7 & F8: Control de Volumen (Usando tus scripts OSD)
bindl = , XF86AudioMute, exec, ~/.config/hypr/widgets/osd.sh vol_mute
bindel = , XF86AudioLowerVolume, exec, ~/.config/hypr/widgets/osd.sh vol_down
bindel = , XF86AudioRaiseVolume, exec, ~/.config/hypr/widgets/osd.sh vol_up

# F9, F10 & F11: Control Multimedia y Micrófono
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioMicMute, exec, ~/.config/hypr/widgets/osd.sh mic_mute
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next

# F12: Modo Avión / Wireless Toggle
bindl = , XF86RFKill, exec, nmcli radio wifi toggle

# --- Toggle CAVA (Visualizador) ---
bind = SUPER, O, exec, ~/.config/hypr/widgets/toggle-cava.sh

# --- Notificaciones (Panel) ---
bind = SUPER, N, exec, swaync-client -t -sw

# --- KDE Connect ---
bind = SUPER, K, exec, ~/.config/hypr/widgets/kde-connect.sh

# --- Apagado ---
bind = SUPER, X, exec, ~/.config/hypr/widgets/menu-sistema.sh

# --- Capturas de Pantalla ---
bind = , Print, exec, ~/.config/hypr/widgets/screenshot.sh full
bind = CTRL, Print, exec, ~/.config/hypr/widgets/screenshot.sh region
